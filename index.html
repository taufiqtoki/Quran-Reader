<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Al Quranul Kareem</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <link href="./style.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script src="./main.js" type="module" defer></script>
</head>
<body class="bg-gray-100 h-screen" onkeydown="handleKeyDown(event)" ontouchstart="handleTouchStart(event)" ontouchmove="handleTouchMove(event)">
  <div class="h-full w-full flex flex-col md:flex-row">
    <!-- Left: Bookmarks -->
    <aside class="w-full md:w-1/4 bg-gray-100 p-4 shadow-md overflow-y-auto">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-bold">Bookmarks</h2>
        <button id="add-bookmark-modal" class="text-2xl">★</button>
      </div>
      <ul id="bookmark-list" class="space-y-2"></ul>
    </aside>

    <!-- Middle: PDF Viewer -->
    <main class="flex-1 flex justify-center items-center bg-white shadow-md relative pdf-viewer" tabindex="0">
      <canvas id="pdf-render" class="border"></canvas>
      <div id="loading" class="absolute inset-0 flex justify-center items-center bg-white bg-opacity-75">
        <div class="spinner"></div>
      </div>
    </main>

    <!-- Right: Controls -->
    <aside class="w-full md:w-1/4 bg-gray-100 p-4 shadow-md">
      <div class="text-right mb-4">
        <h1 class="text-2xl font-bold">Al Quranul Kareem</h1>
        <p class="text-gray-600">My Favourite Book</p>
      </div>
      <div class="space-y-4">
        <button id="prev-page" class="bg-blue-500 text-white px-4 py-2 rounded w-full flex items-center justify-center">
          <i class="fas fa-arrow-left mr-2"></i> Previous Page
        </button>
        <button id="next-page" class="bg-blue-500 text-white px-4 py-2 rounded w-full flex items-center justify-center">
          <i class="fas fa-arrow-right mr-2"></i> Next Page
        </button>
        <div class="flex items-center space-x-2">
          <input type="number" id="page-input" placeholder="Page #" class="border px-2 py-1 rounded flex-1" onclick="setFocus('input')" onblur="clearFocus('input')">
          <button id="go-to-page" class="bg-green-500 text-white px-4 py-2 rounded flex items-center justify-center">
            <i class="fas fa-search mr-2"></i> Go
          </button>
        </div>
        <button id="fullscreen" class="bg-yellow-500 text-white px-4 py-2 rounded w-full flex items-center justify-center">
          <i class="fas fa-expand mr-2"></i> Full Screen
        </button>
      </div>
      <div class="mt-6 text-center">
        <span id="page-info" class="text-lg text-gray-700"></span>
      </div>
    </aside>
  </div>

  <!-- Modal for Adding/Editing Bookmark -->
  <div id="bookmark-modal" class="fixed inset-0 bg-gray-800 bg-opacity-50 flex justify-center items-center hidden">
    <div class="bg-white p-6 rounded shadow-lg w-11/12 md:w-1/3">
      <h3 class="text-xl font-bold mb-4">Add/Edit Bookmark</h3>
      <div class="space-y-4">
        <input type="number" id="modal-page-number" class="border px-2 py-1 rounded w-full" placeholder="Page Number">
        <input type="text" id="modal-bookmark-name" class="border px-2 py-1 rounded w-full" placeholder="Bookmark Name">
      </div>
      <div class="flex justify-end space-x-2 mt-4">
        <button id="save-bookmark" class="bg-green-500 text-white px-4 py-2 rounded">Save</button>
        <button id="cancel-modal" class="bg-gray-500 text-white px-4 py-2 rounded">Cancel</button>
      </div>
    </div>
  </div>
</body>
</html>
