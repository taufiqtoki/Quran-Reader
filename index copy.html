<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Al Quranul Kareem</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <style>
    #pdf-render {
      max-width: 100%;
      height: auto;
    }
    input[type="number"] {
      cursor: text;
    }
    input[type="number"]:focus {
      outline: none;
    }
    body, html {
      user-select: none;
    }
    .pdf-viewer {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>
<body class="bg-gray-100 h-screen" onkeydown="handleKeyDown(event)" ontouchstart="handleTouchStart(event)" ontouchmove="handleTouchMove(event)">
  <div class="h-full w-full flex flex-col md:flex-row">
    <!-- Left: Bookmarks -->
    <aside class="w-full md:w-1/4 bg-gray-100 p-4 shadow-md overflow-y-auto">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-bold">Bookmarks</h2>
        <button id="add-bookmark-modal" class="text-2xl">★</button>
      </div>
      <ul id="bookmark-list" class="space-y-2">
        <!-- Bookmarks will be dynamically added here -->
      </ul>
    </aside>

    <!-- Middle: PDF Viewer -->
    <main class="flex-1 flex justify-center items-center bg-white shadow-md relative pdf-viewer" ondblclick="toggleFullScreen()" tabindex="0">
      <canvas id="pdf-render" class="border"></canvas>
    </main>

    <!-- Right: Controls -->
    <aside class="w-full md:w-1/4 bg-gray-100 p-4 shadow-md">
      <div class="text-right mb-4">
        <h1 class="text-2xl font-bold">Al Quranul Kareem</h1>
        <p class="text-gray-600">My Favourite Book</p>
      </div>
      <div class="space-y-4">
        <button id="prev-page" class="bg-blue-500 text-white px-4 py-2 rounded w-full">Previous Page</button>
        <button id="next-page" class="bg-blue-500 text-white px-4 py-2 rounded w-full">Next Page</button>
        <div class="flex items-center space-x-2">
          <button id="zoom-in" class="bg-gray-500 text-white px-4 py-2 rounded">Zoom In</button>
          <button id="zoom-out" class="bg-gray-500 text-white px-4 py-2 rounded">Zoom Out</button>
        </div>
        <div class="flex items-center space-x-2">
          <input type="number" id="page-input" placeholder="Page #" class="border px-2 py-1 rounded flex-1" onclick="setFocus('input')" onblur="clearFocus('input')">
          <button id="go-to-page" class="bg-green-500 text-white px-4 py-2 rounded">Go</button>
        </div>
      </div>
      <div class="mt-6 text-center">
        <span id="page-info" class="text-lg text-gray-700"></span>
      </div>
    </aside>
  </div>

  <!-- Modal for Adding/Editing Bookmark -->
  <div id="bookmark-modal" class="fixed inset-0 bg-gray-800 bg-opacity-50 flex justify-center items-center hidden">
    <div class="bg-white p-6 rounded shadow-lg w-11/12 md:w-1/3">
      <h3 class="text-xl font-bold mb-4">Add/Edit Bookmark</h3>
      <div class="space-y-4">
        <input type="number" id="modal-page-number" class="border px-2 py-1 rounded w-full" placeholder="Page Number">
        <input type="text" id="modal-bookmark-name" class="border px-2 py-1 rounded w-full" placeholder="Bookmark Name">
      </div>
      <div class="flex justify-end space-x-2 mt-4">
        <button id="save-bookmark" class="bg-green-500 text-white px-4 py-2 rounded">Save</button>
        <button id="cancel-modal" class="bg-gray-500 text-white px-4 py-2 rounded">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    const url = './assets/book.pdf';

    let pdfDoc = null;
    let pageNum = localStorage.getItem('lastPage') ? parseInt(localStorage.getItem('lastPage'), 10) : 1;
    let pageIsRendering = false;
    let pageNumPending = null;
    let scale = 1;
    const canvas = document.getElementById('pdf-render');
    const ctx = canvas.getContext('2d');
    let bookmarks = JSON.parse(localStorage.getItem('bookmarks')) || [];
    let xDown = null;
    let yDown = null;
    let focusedElement = null;
 
    const renderPage = (num) => {
      pageIsRendering = true;
      pdfDoc.getPage(num).then((page) => {
        const viewport = page.getViewport({ scale });
        const outputScale = window.devicePixelRatio || 1;

        // Adjust canvas size for high-resolution displays
        canvas.width = Math.floor(viewport.width * outputScale);
        canvas.height = Math.floor(viewport.height * outputScale);
        canvas.style.width = `${viewport.width}px`;
        canvas.style.height = `${viewport.height}px`;

        const renderCtx = {
          canvasContext: ctx,
          viewport,
          transform: [outputScale, 0, 0, outputScale, 0, 0]
        };

        page.render(renderCtx).promise.then(() => {
          pageIsRendering = false;
          if (pageNumPending !== null) {
            renderPage(pageNumPending);
            pageNumPending = null;
          }
        });
        document.getElementById('page-info').textContent = `Page ${num} of ${pdfDoc.numPages}`;
        localStorage.setItem('lastPage', num);
        updateStarColor();
      });
    };

    const queueRenderPage = (num) => {
      if (pageIsRendering) {
        pageNumPending = num;
      } else {
        renderPage(num);
      }
    };

    const showPrevPage = () => {
      if (pageNum <= 1) return;
      pageNum--;
      queueRenderPage(pageNum);
    };

    const showNextPage = () => {
      if (pageNum >= pdfDoc.numPages) return;
      pageNum++;
      queueRenderPage(pageNum);
    };

    const jumpToPage = () => {
      const pageInput = document.getElementById('page-input');
      const page = parseInt(pageInput.value, 10);
      if (page >= 1 && page <= pdfDoc.numPages) {
        pageNum = page;
        queueRenderPage(pageNum);
      } else {
        alert('Invalid page number.');
      }
    };

    const updateBookmarkList = () => {
      const bookmarkList = document.getElementById('bookmark-list');
      bookmarkList.innerHTML = '';
      bookmarks.forEach((bookmark, index) => {
        const li = document.createElement('li');
        li.className = 'flex justify-between items-center bg-gray-200 px-4 py-2 rounded';
        li.innerHTML = `<span class="cursor-pointer" onclick="jumpToBookmark(${bookmark.page})">${bookmark.name} (Page ${bookmark.page})</span>
          <div class="flex space-x-2">
            <button class="text-blue-500" onclick="editBookmark(${index})">✎</button>
            <button class="text-red-500" onclick="deleteBookmark(${index})">✖</button>
          </div>`;
        bookmarkList.appendChild(li);
      });
      localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
    };

    const jumpToBookmark = (page) => {
      pageNum = page;
      queueRenderPage(pageNum);
    };

    const addBookmarkModal = () => {
      document.getElementById('modal-page-number').value = pageNum;
      document.getElementById('modal-bookmark-name').value = 'Continue';
      document.getElementById('bookmark-modal').classList.remove('hidden');
    };

    const saveBookmark = () => {
      const page = parseInt(document.getElementById('modal-page-number').value, 10);
      const name = document.getElementById('modal-bookmark-name').value.trim();

      if (!page || !name) {
        alert('Please enter both a page number and a bookmark name.');
        return;
      }

      bookmarks.push({ page, name });
      updateBookmarkList();
      closeModal();
      updateStarColor();
    };

    const editBookmark = (index) => {
      const bookmark = bookmarks[index];
      document.getElementById('modal-page-number').value = bookmark.page;
      document.getElementById('modal-bookmark-name').value = bookmark.name;
      document.getElementById('bookmark-modal').classList.remove('hidden');

      const saveButton = document.getElementById('save-bookmark');
      saveButton.onclick = () => {
        bookmarks[index] = {
          page: parseInt(document.getElementById('modal-page-number').value, 10),
          name: document.getElementById('modal-bookmark-name').value.trim()
        };
        updateBookmarkList();
        closeModal();
      };

      document.getElementById('bookmark-modal').onkeydown = (event) => {
        if (event.key === 'Enter') {
          saveButton.click();
        }
      };
    };

    const deleteBookmark = (index) => {
      if (confirm('Are you sure you want to delete this bookmark?')) {
        bookmarks.splice(index, 1);
        updateBookmarkList();
      }
    };

    const closeModal = () => {
      document.getElementById('bookmark-modal').classList.add('hidden');
    };

    const updateStarColor = () => {
      const addBookmarkButton = document.getElementById('add-bookmark-modal');
      const isBookmarked = bookmarks.some(bookmark => bookmark.page === pageNum);
      addBookmarkButton.style.color = isBookmarked ? 'blue' : 'black';
    };

    const setFocus = (element) => {
      focusedElement = element;
    };

    const clearFocus = (element) => {
      if (focusedElement === element) {
        focusedElement = null;
      }
    };

    const handleKeyDown = (event) => {
      if (focusedElement !== 'input') {
        switch (event.key) {
          case 'ArrowLeft':
            showPrevPage();
            break;
          case 'ArrowRight':
            showNextPage();
            break;
          case 'ArrowUp':
          case 'PageUp':
            showPrevPage();
            break;
          case 'ArrowDown':
          case 'PageDown':
            showNextPage();
            break;
          case 'Home':
            pageNum = 1;
            queueRenderPage(pageNum);
            break;
          case 'End':
            pageNum = pdfDoc.numPages;
            queueRenderPage(pageNum);
            break;
          case 'Enter':
          case ' ':
            showNextPage();
            break;
          case 'f':
            toggleFullScreen();
            break;
          case 'b':
            addBookmarkModal();
            break;
          default:
            break;
        }
      }
    };

    const handleTouchStart = (evt) => {
      const firstTouch = evt.touches[0];
      xDown = firstTouch.clientX;
      yDown = firstTouch.clientY;
    };

    const handleTouchMove = (evt) => {
      if (!xDown || !yDown) {
        return;
      }

      const xUp = evt.touches[0].clientX;
      const yUp = evt.touches[0].clientY;

      const xDiff = xDown - xUp;
      const yDiff = yDown - yUp;

      if (Math.abs(xDiff) > Math.abs(yDiff)) {
        if (xDiff > 0) {
          showNextPage();
        } else {
          showPrevPage();
        }
      }

      xDown = null;
      yDown = null;
    };

    const handleWheel = (event) => {
      if (event.deltaY > 0) {
        showNextPage();
      } else {
        showPrevPage();
      }
    };

    const handleMouseUpDown = (event) => {
      if (event.button === 4) { // Mouse button 4 (up)
        showPrevPage();
      } else if (event.button === 5) { // Mouse button 5 (down)
        showNextPage();
      }
    };

    const zoomIn = () => {
      scale += 0.1;
      queueRenderPage(pageNum);
    };

    const zoomOut = () => {
      if (scale > 0.2) {
        scale -= 0.1;
        queueRenderPage(pageNum);
      }
    };

    pdfjsLib.getDocument(url).promise.then((pdfDoc_) => {
      pdfDoc = pdfDoc_;
      renderPage(pageNum);
    }).catch((err) => {
      console.error(err);
      alert('Failed to load PDF. Please check the file path.');
    });

    document.getElementById('prev-page').addEventListener('click', showPrevPage);
    document.getElementById('next-page').addEventListener('click', showNextPage);
    document.getElementById('go-to-page').addEventListener('click', jumpToPage);
    document.getElementById('add-bookmark-modal').addEventListener('click', addBookmarkModal);
    document.getElementById('save-bookmark').addEventListener('click', saveBookmark);
    document.getElementById('cancel-modal').addEventListener('click', closeModal);
    document.getElementById('zoom-in').addEventListener('click', zoomIn);
    document.getElementById('zoom-out').addEventListener('click', zoomOut);

    document.getElementById('page-input').addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        jumpToPage();
      }
    });

    document.querySelector('.pdf-viewer').addEventListener('wheel', handleWheel);
    document.querySelector('.pdf-viewer').addEventListener('mousedown', handleMouseUpDown);

    const toggleFullScreen = () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        }
      }
      setTimeout(() => renderPage(pageNum), 100); // Re-render the page to adjust the canvas size after entering/exiting full-screen mode
    };

    updateBookmarkList();
  </script>
</body>
</html>
