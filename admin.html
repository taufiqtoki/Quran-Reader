<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
  <div class="container mx-auto p-6">
    <h1 class="text-3xl font-bold text-center mb-6">Admin Panel</h1>

    <!-- Upload PDF Section -->
    <section id="upload-pdf" class="mb-8">
      <h2 class="text-xl font-semibold mb-4">Upload Book</h2>
      <input type="file" id="file-input" class="mb-4">
      <button id="upload-btn" class="bg-green-500 text-white px-4 py-2 rounded">Upload</button>
      <div id="upload-status" class="mt-4"></div>
    </section>

    <!-- Manage Bookmarks -->
    <section id="manage-bookmarks">
      <h2 class="text-xl font-semibold mb-4">Manage Bookmarks</h2>
      <ul id="admin-bookmarks-list" class="list-disc pl-5">
        <!-- Editable Bookmarks List -->
      </ul>
    </section>

    <!-- Delete Book Section -->
    <section id="delete-book" class="mt-8">
      <h2 class="text-xl font-semibold mb-4 text-red-500">Delete Book</h2>
      <button id="delete-btn" class="bg-red-500 text-white px-4 py-2 rounded">
        Delete Book
      </button>
    </section>
  </div>

  <script src="./scripts/admin.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/idb/build/iife/index-min.js"></script>

</body>
</html>
